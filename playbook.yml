---
- name: Deploy Task API
  hosts: servers
  become: yes
  gather_facts: no
  vars:
    docker_image: niangoos/task-api:latest
    container_name: task-api
    app_port: 8085
    mysql_root_password: root
    mysql_database: taskdb

  tasks:
    # --- Step 1: Prepare the VM ---
    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - mysql-server
          - python3-pymysql
        state: present

    - name: Check if Docker is installed
      command: docker --version
      register: docker_check
      ignore_errors: yes
      changed_when: false

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      when: docker_check.rc != 0

    - name: Add Docker repository
      apt_repository:
        repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      when: docker_check.rc != 0

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
      when: docker_check.rc != 0

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Start and enable MySQL
      systemd:
        name: mysql
        state: started
        enabled: yes

    - name: Configure MySQL root user
      shell: >
        mysql -u root -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ mysql_root_password }}'; FLUSH PRIVILEGES;" 2>/dev/null
        || mysql -u root -p'{{ mysql_root_password }}' -e "SELECT 1;" 2>/dev/null

    - name: Create MySQL remote root user
      shell: >
        mysql -u root -p'{{ mysql_root_password }}' -e "CREATE USER IF NOT EXISTS 'root'@'%' IDENTIFIED WITH mysql_native_password BY '{{ mysql_root_password }}'; GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION; FLUSH PRIVILEGES;"

    - name: Create MySQL database
      shell: >
        mysql -u root -p'{{ mysql_root_password }}' -e "CREATE DATABASE IF NOT EXISTS {{ mysql_database }};"

    - name: Allow MySQL remote connections
      lineinfile:
        path: /etc/mysql/mysql.conf.d/mysqld.cnf
        regexp: '^bind-address'
        line: 'bind-address = 0.0.0.0'
      notify: Restart MySQL

    # --- Step 2: Deploy the application ---
    - name: Pull Docker image
      shell: docker pull {{ docker_image }}

    - name: Stop existing container
      shell: docker rm -f {{ container_name }}
      ignore_errors: yes

    - name: Run task-api container
      shell: >
        docker run -d
        --name {{ container_name }}
        --restart always
        --network host
        -e SPRING_DATASOURCE_URL=jdbc:mysql://127.0.0.1:3306/{{ mysql_database }}
        -e SPRING_DATASOURCE_USERNAME=root
        -e SPRING_DATASOURCE_PASSWORD={{ mysql_root_password }}
        {{ docker_image }}

    # --- Step 3: Verification ---
    - name: Wait for application to start
      wait_for:
        port: "{{ app_port }}"
        delay: 10
        timeout: 60

    - name: Verify application is running
      uri:
        url: "http://localhost:{{ app_port }}/api/tasks"
        method: GET
        status_code: 200
      register: result

    - name: Display verification result
      debug:
        msg: "Application is running! Response status: {{ result.status }}"

  handlers:
    - name: Restart MySQL
      systemd:
        name: mysql
        state: restarted
